<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉语练习 · Luyện Dịch Việt–Trung HSK</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Nunito:wght@400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdf6f0;
  --surface: #fff9f5;
  --card: #ffffff;
  --border: #f0e4d8;
  --border2: #e8d5c4;
  --text: #3d2c20;
  --text2: #8a6f5e;
  --text3: #b89d8d;
  --accent: #e8845a;
  --accent2: #f0a07a;
  --accent-light: #fdeee6;
  --radius: 16px;

  /* pastel level colors */
  --p1: #a8d8f0; --p1bg: #eaf6fd; --p1text: #2d7da8;
  --p2: #a8e6c8; --p2bg: #e8f9f0; --p2text: #2a7a52;
  --p3: #ffd6a0; --p3bg: #fff5e6; --p3text: #a05f10;
  --p4: #d4b8f0; --p4bg: #f3ecfc; --p4text: #6b3db0;
  --p5: #ffb8b8; --p5bg: #fff0f0; --p5text: #b03030;
  --p6: #f0d890; --p6bg: #fdf7e0; --p6text: #906a00;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Soft background blobs */
.ambient { position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; }
.amb1 { width: 450px; height: 450px; background: #ffd6c8; opacity: 0.45; top: -120px; right: -120px; }
.amb2 { width: 380px; height: 380px; background: #c8e8ff; opacity: 0.35; bottom: -80px; left: -80px; }
.amb3 { width: 300px; height: 300px; background: #d4f0c8; opacity: 0.3; top: 40%; left: 60%; }

.wrap { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 0 1.5rem 5rem; }

/* Header */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.5rem 0 1.25rem;
  border-bottom: 1.5px solid var(--border);
  margin-bottom: 2rem;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, #ffb347, #e8845a);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif SC', serif; font-size: 16px; color: #fff; font-weight: 700;
}
.brand-zh { font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 800; color: var(--text); }
.brand-vi { font-size: 12px; color: var(--text3); }
.streak-pill {
  display: flex; align-items: center; gap: 5px;
  background: #fff8f0; border: 1.5px solid #ffd6b0;
  border-radius: 20px; padding: 5px 14px; font-size: 13px;
  color: var(--text2); font-weight: 600;
}
.streak-num { color: #e8845a; }

/* Level selector */
.level-section { margin-bottom: 1.75rem; }
.level-label { font-size: 11px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text3); margin-bottom: 0.75rem; font-weight: 700; }
.level-grid { display: flex; gap: 8px; flex-wrap: wrap; }

.level-btn {
  flex: 1; min-width: 78px; padding: 10px 6px;
  border-radius: 12px; border: 1.5px solid var(--border2);
  background: var(--card); color: var(--text2);
  cursor: pointer; font-family: 'Nunito', sans-serif;
  font-size: 12px; font-weight: 600; text-align: center;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.lv-badge { font-weight: 800; font-size: 15px; display: block; margin-bottom: 2px; }
.lv-name { display: block; font-size: 10px; font-weight: 500; opacity: 0.7; }

.level-btn[data-lv="1"] { --lc: var(--p1); --lbg: var(--p1bg); --lt: var(--p1text); }
.level-btn[data-lv="2"] { --lc: var(--p2); --lbg: var(--p2bg); --lt: var(--p2text); }
.level-btn[data-lv="3"] { --lc: var(--p3); --lbg: var(--p3bg); --lt: var(--p3text); }
.level-btn[data-lv="4"] { --lc: var(--p4); --lbg: var(--p4bg); --lt: var(--p4text); }
.level-btn[data-lv="5"] { --lc: var(--p5); --lbg: var(--p5bg); --lt: var(--p5text); }
.level-btn[data-lv="6"] { --lc: var(--p6); --lbg: var(--p6bg); --lt: var(--p6text); }

.level-btn:hover { background: var(--lbg); border-color: var(--lc); color: var(--lt); }
.level-btn.active {
  background: var(--lbg); border-color: var(--lc);
  color: var(--lt);
  box-shadow: 0 3px 12px -2px var(--lc);
}
.level-btn.active .lv-badge { color: var(--lt); }

/* Set buttons */
.set-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.set-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 700; }
.set-btn {
  padding: 4px 14px; border-radius: 20px;
  border: 1.5px solid var(--border2); background: transparent;
  color: var(--text2); cursor: pointer; font-size: 12px; font-weight: 600;
  font-family: 'Nunito', sans-serif; transition: all 0.2s;
}
.set-btn.active, .set-btn:hover {
  background: var(--accent-light); color: var(--accent); border-color: var(--accent2);
}

/* Progress */
.progress-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
.prog-label { font-size: 11px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; }
.prog-count { font-size: 13px; color: var(--text2); font-weight: 600; }
.progress-track { height: 6px; background: var(--border); border-radius: 4px; margin-bottom: 1.5rem; overflow: hidden; }
.progress-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}

/* Exercise card */
.ex-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem;
  margin-bottom: 1.25rem;
  box-shadow: 0 4px 24px rgba(200,140,100,0.08);
  animation: cardIn 0.3s cubic-bezier(0.4,0,0.2,1);
}
@keyframes cardIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

.card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.topic-tag {
  font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
  padding: 4px 12px; border-radius: 20px;
  background: var(--accent-light); color: var(--accent);
  border: 1.5px solid #fdd0bb;
}
.card-num { font-size: 12px; color: var(--text3); font-weight: 600; }

.vi-text {
  font-family: 'Lora', serif; font-size: 21px; line-height: 1.6;
  color: var(--text); margin-bottom: 1.75rem;
  padding-bottom: 1.5rem; border-bottom: 1.5px dashed var(--border2);
}

.input-label { font-size: 11px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text3); margin-bottom: 0.6rem; font-weight: 700; }
.input-row { display: flex; gap: 10px; }

input[type="text"] {
  flex: 1; font-family: 'Noto Serif SC', serif; font-size: 17px;
  padding: 11px 15px; background: var(--surface);
  border: 1.5px solid var(--border2); border-radius: 12px;
  color: var(--text); outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input[type="text"]::placeholder { color: var(--text3); font-size: 14px; font-family: 'Nunito', sans-serif; }
input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,132,90,0.12); }

.btn {
  padding: 11px 18px; border-radius: 12px;
  border: 1.5px solid var(--border2); background: var(--surface);
  color: var(--text2); cursor: pointer;
  font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 600;
  white-space: nowrap; transition: all 0.2s;
}
.btn:hover { color: var(--accent); border-color: var(--accent2); background: var(--accent-light); }
.btn:disabled { opacity: 0.35; cursor: default; }
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; border-color: transparent; font-weight: 700;
  box-shadow: 0 3px 10px rgba(232,132,90,0.3);
}
.btn-primary:hover { background: linear-gradient(135deg, #d4723e, var(--accent)); color: #fff; border-color: transparent; box-shadow: 0 4px 14px rgba(232,132,90,0.4); }

/* Answer box */
.answer-box {
  margin-top: 1.25rem; padding: 1.25rem 1.5rem;
  background: #fffaf7; border-radius: 12px;
  border-left: 4px solid var(--accent);
  border-top: 1.5px solid var(--border);
  border-right: 1.5px solid var(--border);
  border-bottom: 1.5px solid var(--border);
  display: none; animation: fadeIn 0.25s ease;
}
.answer-box.show { display: block; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.ans-zh { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.5; }
.ans-py { font-size: 14px; color: var(--accent); margin-bottom: 12px; font-style: italic; font-weight: 600; }

.vocab-label, .grammar-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text3); margin-bottom: 5px; display: block; font-weight: 700;
}
.vocab-item {
  display: inline-block; font-size: 13px;
  background: #fff0e8; border: 1.5px solid #fdd0bb;
  border-radius: 8px; padding: 3px 10px; margin: 3px 4px 3px 0;
  color: var(--text2); line-height: 1.6; font-weight: 600;
}
.vocab-item strong { color: var(--accent); font-weight: 700; }

.ans-grammar {
  font-size: 13px; color: var(--text2); font-weight: 500;
  background: #f6f2ff; border-radius: 10px; padding: 9px 13px;
  line-height: 1.7; border: 1.5px solid #e4d8f8; margin-top: 10px;
}

/* Nav */
.nav-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.dots { display: flex; gap: 5px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border2); transition: all 0.3s; }
.dot.done { background: #ffc0a0; }
.dot.active { background: var(--accent); transform: scale(1.4); }

/* Done screen */
.done-screen { display: none; text-align: center; padding: 3rem 1rem; animation: cardIn 0.4s ease; }
.done-screen.show { display: block; }
.done-emoji { font-size: 52px; margin-bottom: 0.5rem; }
.done-zh { font-family: 'Noto Serif SC', serif; font-size: 30px; font-weight: 700; color: var(--accent); margin-bottom: 0.4rem; }
.done-py { font-size: 14px; color: var(--text3); margin-bottom: 1.25rem; font-style: italic; }
.done-title { font-family: 'Lora', serif; font-size: 22px; color: var(--text); margin-bottom: 0.5rem; font-weight: 600; }
.done-sub { font-size: 14px; color: var(--text2); margin-bottom: 2rem; line-height: 1.7; font-weight: 500; }
.done-stats { display: flex; justify-content: center; gap: 12px; margin-bottom: 2rem; flex-wrap: wrap; }
.stat {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 1rem 1.5rem; min-width: 100px;
  box-shadow: 0 2px 10px rgba(200,140,100,0.07);
}
.stat-n { font-size: 28px; font-weight: 800; color: var(--accent); margin-bottom: 2px; }
.stat-l { font-size: 12px; color: var(--text3); font-weight: 600; }
.done-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

@media (max-width: 600px) {
  .vi-text { font-size: 18px; }
  .ans-zh { font-size: 19px; }
  .level-btn { min-width: 58px; }
  .lv-badge { font-size: 13px; }
}
</style>
</head>
<body>
<div class="ambient amb1"></div>
<div class="ambient amb2"></div>
<div class="ambient amb3"></div>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="brand-icon">练</div>
      <div>
        <div class="brand-zh">Luyện Dịch Việt–Trung</div>
        <div class="brand-vi">HSK 1 → 6 · Offline · Miễn phí</div>
      </div>
    </div>
    <div class="streak-pill">🔥 Ngày <span class="streak-num" id="streak">1</span></div>
  </header>

  <div class="level-section">
    <div class="level-label">Chọn cấp độ</div>
    <div class="level-grid">
      <button class="level-btn active" data-lv="1" onclick="setLevel(1,this)"><span class="lv-badge">HSK1</span><span class="lv-name">Sơ cấp</span></button>
      <button class="level-btn" data-lv="2" onclick="setLevel(2,this)"><span class="lv-badge">HSK2</span><span class="lv-name">Cơ bản</span></button>
      <button class="level-btn" data-lv="3" onclick="setLevel(3,this)"><span class="lv-badge">HSK3</span><span class="lv-name">Trung cấp</span></button>
      <button class="level-btn" data-lv="4" onclick="setLevel(4,this)"><span class="lv-badge">HSK4</span><span class="lv-name">Trung cao</span></button>
      <button class="level-btn" data-lv="5" onclick="setLevel(5,this)"><span class="lv-badge">HSK5</span><span class="lv-name">Cao cấp</span></button>
      <button class="level-btn" data-lv="6" onclick="setLevel(6,this)"><span class="lv-badge">HSK6</span><span class="lv-name">Thành thạo</span></button>
    </div>
  </div>

  <div class="set-row">
    <span class="set-label">Bộ:</span>
    <div id="set-btns"></div>
  </div>

  <div class="progress-row">
    <span class="prog-label">Tiến độ</span>
    <span class="prog-count" id="prog-text">1 / 10</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:10%"></div></div>

  <div id="exercise-area">
    <div class="ex-card" id="ex-card">
      <div class="card-top">
        <span class="topic-tag" id="topic-tag">—</span>
        <span class="card-num" id="card-num">1 / 10</span>
      </div>
      <div class="vi-text" id="vi-text"></div>
      <div class="input-label">Bản dịch tiếng Trung của bạn</div>
      <div class="input-row">
        <input type="text" id="user-input" placeholder="输入中文翻译..." autocomplete="off" />
        <button class="btn" onclick="reveal()">Đáp án</button>
      </div>
      <div class="answer-box" id="answer-box">
        <div class="ans-zh" id="ans-zh"></div>
        <div class="ans-py" id="ans-py"></div>
        <div class="vocab-label">Từ vựng</div>
        <div id="ans-vocab"></div>
        <div class="ans-grammar">
          <span class="grammar-label">Ngữ pháp</span>
          <span id="ans-grammar"></span>
        </div>
      </div>
    </div>
    <div class="nav-row">
      <button class="btn" id="btn-prev" onclick="prev()">← Trước</button>
      <div class="dots" id="dots"></div>
      <button class="btn btn-primary" id="btn-next" onclick="next()">Tiếp →</button>
    </div>
  </div>

  <div class="done-screen" id="done-screen">
    <div class="done-emoji">🌸</div>
    <div class="done-zh">很好！</div>
    <div class="done-py">Hěn hǎo! — Rất tốt!</div>
    <div class="done-title">Hoàn thành bộ câu!</div>
    <div class="done-sub">Chọn bộ tiếp theo hoặc ôn lại để ghi nhớ sâu hơn.</div>
    <div class="done-stats">
      <div class="stat"><div class="stat-n">10</div><div class="stat-l">Câu hoàn thành</div></div>
      <div class="stat"><div class="stat-n" id="done-lv">HSK1</div><div class="stat-l">Cấp độ</div></div>
      <div class="stat"><div class="stat-n" id="done-day">1</div><div class="stat-l">Ngày học</div></div>
    </div>
    <div class="done-btns">
      <button class="btn" onclick="restart()">↺ Ôn lại</button>
      <button class="btn btn-primary" onclick="nextSet()">Bộ tiếp →</button>
    </div>
  </div>
</div>

<script>
const DATA = {
  1: [
    // Bộ 1
    [
      { topic:"Chào hỏi", vi:"Xin chào! Bạn tên là gì?", zh:"你好！你叫什么名字？", py:"Nǐ hǎo! Nǐ jiào shénme míngzi?", vocab:[{w:"你好",m:"xin chào"},{w:"叫",m:"tên là, gọi là"},{w:"名字",m:"tên"}], grammar:"什么 dùng để hỏi 'cái gì, gì'. 你叫什么名字 = tên bạn là gì." },
      { topic:"Gia đình", vi:"Tôi có ba người trong gia đình.", zh:"我家有三口人。", py:"Wǒ jiā yǒu sān kǒu rén.", vocab:[{w:"家",m:"nhà, gia đình"},{w:"有",m:"có"},{w:"口",m:"miệng (đơn vị đếm thành viên gia đình)"}], grammar:"口 là lượng từ dùng riêng để đếm số người trong gia đình." },
      { topic:"Số đếm", vi:"Tôi muốn mua năm quả táo.", zh:"我想买五个苹果。", py:"Wǒ xiǎng mǎi wǔ gè píngguǒ.", vocab:[{w:"想",m:"muốn"},{w:"买",m:"mua"},{w:"个",m:"cái (lượng từ phổ thông)"},{w:"苹果",m:"táo"}], grammar:"个 là lượng từ chung, dùng được với hầu hết danh từ." },
      { topic:"Thời gian", vi:"Hôm nay là thứ Hai.", zh:"今天是星期一。", py:"Jīntiān shì xīngqī yī.", vocab:[{w:"今天",m:"hôm nay"},{w:"是",m:"là"},{w:"星期一",m:"thứ Hai"}], grammar:"是 là động từ 'là', dùng để nối chủ ngữ với danh từ vị ngữ." },
      { topic:"Màu sắc", vi:"Cái áo này màu đỏ rất đẹp.", zh:"这件衣服红色很好看。", py:"Zhè jiàn yīfu hóngsè hěn hǎokàn.", vocab:[{w:"这",m:"này"},{w:"件",m:"cái (lượng từ cho quần áo)"},{w:"红色",m:"màu đỏ"},{w:"好看",m:"đẹp"}], grammar:"件 là lượng từ dùng cho áo, quần áo. 好看 = trông đẹp mắt." },
      { topic:"Đồ uống", vi:"Tôi muốn uống một cốc nước.", zh:"我想喝一杯水。", py:"Wǒ xiǎng hē yī bēi shuǐ.", vocab:[{w:"喝",m:"uống"},{w:"杯",m:"cốc, ly (lượng từ)"},{w:"水",m:"nước"}], grammar:"杯 vừa là danh từ (cốc) vừa là lượng từ chỉ đơn vị nước." },
      { topic:"Nơi chốn", vi:"Trường học ở đằng kia.", zh:"学校在那边。", py:"Xuéxiào zài nàbiān.", vocab:[{w:"学校",m:"trường học"},{w:"在",m:"ở, tại"},{w:"那边",m:"đằng kia, phía đó"}], grammar:"在 dùng để chỉ vị trí. Cấu trúc: chủ ngữ + 在 + địa điểm." },
      { topic:"Thức ăn", vi:"Tôi thích ăn cơm Trung Quốc.", zh:"我喜欢吃中国菜。", py:"Wǒ xǐhuān chī Zhōngguó cài.", vocab:[{w:"喜欢",m:"thích"},{w:"吃",m:"ăn"},{w:"中国菜",m:"đồ ăn Trung Quốc"}], grammar:"喜欢 + động từ = thích làm gì. Cấu trúc cơ bản V+V liên động." },
      { topic:"Thời tiết", vi:"Hôm nay trời rất nóng.", zh:"今天天气很热。", py:"Jīntiān tiānqì hěn rè.", vocab:[{w:"天气",m:"thời tiết"},{w:"很",m:"rất"},{w:"热",m:"nóng"}], grammar:"很 thường đứng trước tính từ, không cần động từ 'là'. 天气很热 = thời tiết rất nóng." },
      { topic:"Số điện thoại", vi:"Số điện thoại của tôi là 0123456789.", zh:"我的电话号码是零一二三四五六七八九。", py:"Wǒ de diànhuà hàomǎ shì líng yī èr sān sì wǔ liù qī bā jiǔ.", vocab:[{w:"电话",m:"điện thoại"},{w:"号码",m:"số, mã số"},{w:"的",m:"của (trợ từ sở hữu)"}], grammar:"的 là trợ từ sở hữu, giống 'của' trong tiếng Việt. 我的 = của tôi." }
    ],
    // Bộ 2
    [

      { topic:"Đạo đức", vi:"Sự tha thứ không phải vì người gây ra lỗi xứng đáng được tha mà vì bản thân ta cần giải phóng.", zh:"宽恕不是因为对方值得被原谅，而是因为自己需要从中解脱。", py:"Kuānshù bù shì yīnwèi duìfāng zhídé bèi yuánliàng, ér shì yīnwèi zìjǐ xūyào cóng zhōng jiětuō.", vocab:[{w:"宽恕",m:"tha thứ, khoan hồng"},{w:"值得",m:"xứng đáng"},{w:"解脱",m:"giải thoát, thoát khỏi"}], grammar:"不是因为...而是因为 = không phải vì...mà vì. 从中 = từ đó, từ trong đó. 被原谅 = được tha thứ (bị động)." },

const LV_COLORS = {1:'#a8d8f0',2:'#a8e6c8',3:'#ffd6a0',4:'#d4b8f0',5:'#ffb8b8',6:'#f0d890'};

let curLv = 1, curSet = 0, cur = 0;

function getDay() {
  return Math.floor((Date.now() - new Date('2025-01-01')) / 86400000) + 1;
}

function setLevel(lv, btn) {
  curLv = lv;
  curSet = 0;
  cur = 0;
  document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('prog-fill').style.background = '';
  buildSetBtns();
  renderExercise();
}

function buildSetBtns() {
  const sets = DATA[curLv];
  const container = document.getElementById('set-btns');
  container.innerHTML = '';
  sets.forEach((_, i) => {
    const b = document.createElement('button');
    b.className = 'set-btn' + (i === curSet ? ' active' : '');
    b.textContent = 'Bộ ' + (i + 1);
    b.onclick = () => {
      curSet = i;
      cur = 0;
      document.querySelectorAll('.set-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      document.getElementById('done-screen').classList.remove('show');
      document.getElementById('exercise-area').style.display = '';
      renderExercise();
    };
    container.appendChild(b);
  });
}

function renderExercise() {
  const sentences = DATA[curLv][curSet];
  const d = sentences[cur];
  document.getElementById('vi-text').textContent = d.vi;
  document.getElementById('topic-tag').textContent = d.topic;
  document.getElementById('card-num').textContent = (cur+1) + ' / 10';
  document.getElementById('ans-zh').textContent = d.zh;
  document.getElementById('ans-py').textContent = d.py;
  document.getElementById('ans-grammar').textContent = d.grammar;

  const vocabEl = document.getElementById('ans-vocab');
  vocabEl.innerHTML = d.vocab.map(v => `<span class="vocab-item"><strong>${v.w}</strong> = ${v.m}</span>`).join('');

  document.getElementById('prog-text').textContent = (cur+1) + ' / 10';
  document.getElementById('prog-fill').style.width = ((cur+1)*10) + '%';
  document.getElementById('answer-box').classList.remove('show');
  document.getElementById('user-input').value = '';
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').textContent = cur === 9 ? 'Xong ✓' : 'Tiếp →';

  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const el = document.createElement('div');
    el.className = 'dot' + (i < cur ? ' done' : i === cur ? ' active' : '');
    dots.appendChild(el);
  }

  const card = document.getElementById('ex-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';

  document.getElementById('user-input').focus();
}

function reveal() {
  document.getElementById('answer-box').classList.add('show');
}

function next() {
  if (cur < 9) { cur++; renderExercise(); }
  else {
    document.getElementById('exercise-area').style.display = 'none';
    document.getElementById('done-screen').classList.add('show');
    document.getElementById('done-lv').textContent = 'HSK' + curLv;
    document.getElementById('done-day').textContent = getDay();
  }
}

function prev() {
  if (cur > 0) { cur--; renderExercise(); }
}

function restart() {
  cur = 0;
  document.getElementById('done-screen').classList.remove('show');
  document.getElementById('exercise-area').style.display = '';
  renderExercise();
}

function nextSet() {
  const sets = DATA[curLv];
  const nextIdx = (curSet + 1) % sets.length;
  const btns = document.querySelectorAll('.set-btn');
  curSet = nextIdx;
  cur = 0;
  btns.forEach((b,i) => b.classList.toggle('active', i === nextIdx));
  document.getElementById('done-screen').classList.remove('show');
  document.getElementById('exercise-area').style.display = '';
  renderExercise();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.id === 'user-input') reveal();
  if (e.key === 'ArrowRight') next();
  if (e.key === 'ArrowLeft') prev();
});

document.getElementById('streak').textContent = getDay();
document.getElementById('done-day').textContent = getDay();
buildSetBtns();
renderExercise();
</script>
